<!DOCTYPE html>
<html>
<head>
  <title>Login Demos</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 100px; }
    input { display: block; margin: 10px auto; padding: 10px; }
    button { padding: 10px 20px; }
  </style>
</head>
<body>

<h2>Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>

<p id="result"></p>

<script>
const API_URL = "https://opensheet.elk.sh/173PIuFakkuF7ZLn0mlHw8Dg_ZcxDLwxl21g6GB5RO9M/Sheet1";
const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwBp5Y20Pl3D44BaeQsaUMeI-wxwoRWOAPZGmQK3dkTi5yFfS_7edClyffG8xSdAl3L3g/exec";
const SHEET_API_URL2 = "https://script.google.com/macros/s/AKfycbxSdtFp-SqwFaXB3S-fiAKSH-A9Bk6vlwWUXM4aVQxHXr-NRtmKuljwyXvZLyXeaMWQ/exec";
async function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;
  const result = document.getElementById("result");

  result.textContent = "Checking...";

  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    console.log(data);
    let found = false;

    data.forEach(row => {
      if (row.Username === user && row.Password === pass) {
        found = true;
      }
    });

    if (found) {
      result.textContent = "✅ Login successful!";
      window.location.href = "soa.html";
    try {
    const response = await fetch(SHEET_API_URL, {
      method: "POST",
      body: JSON.stringify({
        username: user,
        newEmail: "Update"
      })
    });
    const text = await response.text();
    result.textContent = `📤 ${text}`;
  } catch (err) {
    console.error(err);
    result.textContent = "⚠️ Failed to update sheet";
  }
    } else {
      result.textContent = "❌ Invalid username or password";
    }

  } catch (err) {
    result.textContent = "⚠️ Error connecting to server";
  }
}
</script>

</body>
</html>
