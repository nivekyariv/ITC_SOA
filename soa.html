<!DOCTYPE html>
<html>
<head>
  <title>Google Sheets to HTML</title>
  <!--style>
    body { font-family: Arial; margin: 40px; }
    table { border-collapse: collapse; width: 50%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f4f4f4; }
  </style-->
    <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #000; padding: 8px; text-align: center; }
    th { background-color: #ffc107; color: black; }
    .header { background-color: black; color: white; font-size: 24px; }
    .amount { background-color: red; color: white; font-weight: bold; }
    tr:nth-child(even) { background-color: #f2f2f2; }
  </style>
</head>
<body>



<table id="sheetData">
  <thead>
    <!--tr>
      <th colspan="6" class="header">Payables and Payments - Jan</th>
      <th class="amount">-1697.21</th>
    </tr>
    <tr>
      <th>Date</th>
      <th>Activity</th>
      <th>Time Start</th>
      <th>Time End</th>
      <th>Duration(Minutes)</th>
      <th>Description</th>
    </tr-->
  </thead>
  <tbody>
    <!-- Data will go here -->
  </tbody>
</table>

<script>
const API_URL = "https://opensheet.elk.sh/16KTIJBWwH8dJ_Tq4NeOW_jpuRvgsur8gKF5_NpDCetI/Sheet2"; // Replace with your ID
const API_URL2 = "https://opensheet.elk.sh/16KTIJBWwH8dJ_Tq4NeOW_jpuRvgsur8gKF5_NpDCetI/Sheet3"; // Replace with your ID

async function loadSheetData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    const res2 = await fetch(API_URL2);
    const data2 = await res2.json();

    const tbody = document.querySelector("#sheetData tbody");
    tbody.innerHTML = ""; // clear existing content

    const tname = document.querySelector("#sheetData thead");
    tname.innerHTML = "";

    data.forEach(row => {
      const tr = document.createElement("tr");

      // Trim spaces just in case
      const date = row.Date?.trim() || "";
      const description = row.Description?.trim() || "";
      const stime = row.Start_Time?.trim() || "";
      const etime = row.End_Time?.trim() || "";
      const duration = row.Duration?.trim() || "";
      const amount = row.Amount?.trim() || "";

      tr.innerHTML = `
        <td>${date}</td>
        <td>${description}</td>
        <td>${stime}</td>
        <td>${etime}</td>
        <td>${duration}</td>
      `;
      if(amount<0){
        tr.innerHTML = tr.innerHTML + `<td style="background-color: red;">${amount}</td>`  
      }
      else
      {
        tr.innerHTML = tr.innerHTML + `<td style="background-color: green;">${amount}</td>`
      }

      tbody.appendChild(tr);
    });
    data2.forEach(row2 => {
      const tr = document.createElement("tr");

      // Trim spaces just in case
      const name = row2.Name?.trim() || "";
      const totalAmount = row2.Amount?.trim() || "";

      const headerTr1 = document.createElement("tr");
      headerTr1.innerHTML = `
        <th colspan="5" class="header">Payables and Payments - ${name}</th>
        <th class="amount">${totalAmount}</th>
      `;
      tname.appendChild(headerTr1);

      const headerTr2 = document.createElement("tr");
      headerTr2.innerHTML = `
        <th>Date</th>
        <th>Activity</th>
        <th>Time Start</th>
        <th>Time End</th>
        <th>Duration(Minutes)</th>
        <th>Description</th>
      `;
      tname.appendChild(headerTr2);
    });

  } catch (err) {
    console.error("Error fetching sheet:", err);
    const tbody = document.querySelector("#sheetData tbody");
    tbody.innerHTML = "<tr><td colspan='3'>Failed to load data</td></tr>";
  }
}

// Load data on page load
loadSheetData();
</script>

</body>
</html>
